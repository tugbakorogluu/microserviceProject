services:
  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservice_network

  # MongoDB for Package Service
  mongo_package:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: package_db
    volumes:
      - mongo_package_data:/data/db  # İsmi atanmış volume kullanıyoruz
    networks:
      - microservice_network

  # MongoDB for Tracking Service
  mongo_tracking:
    image: mongo:7.0
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: tracking_db
    volumes:
      - mongo_tracking_data:/data/db
    networks:
      - microservice_network

  # MongoDB for Notification Service
  mongo_notification:
    image: mongo:7.0
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: notification_db
    volumes:
      - mongo_notification_data:/data/db
    networks:
      - microservice_network
  # Package Service
  package-service:
    image: smart_tracking_package_service
    build:
      context: ./package-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://root:rootpassword@mongo_package:27017/package_db?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      PACKAGE_EXCHANGE: package.exchange
      PACKAGE_EXCHANGE_TYPE: topic
      NODE_ENV: production
    depends_on:
      - rabbitmq
      - mongo_package
    networks:
      - microservice_network

  # Tracking Service
  tracking-service:
    image: smart_tracking_tracking_service
    build:
      context: ./tracking-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://root:rootpassword@mongo_tracking:27017/tracking_db?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      PACKAGE_EXCHANGE: package.exchange
      TRACKING_EXCHANGE: tracking.exchange
      TRACKING_EXCHANGE_TYPE: topic
      PACKAGE_CREATED_QUEUE: tracking.package.created.queue
      STATUS_SIMULATION_INTERVAL: 10000
      NODE_ENV: production
    depends_on:
      - rabbitmq
      - mongo_tracking
    networks:
      - microservice_network

  # Notification Service
  notification-service:
    image: smart_tracking_notification_service
    build:
      context: ./notification-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://root:rootpassword@mongo_notification:27017/notification_db?authSource=admin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      TRACKING_EXCHANGE: tracking.exchange
      TRACKING_EXCHANGE_TYPE: topic
      PACKAGE_DELIVERED_QUEUE: notification.package.delivered.queue
      NODE_ENV: production
    depends_on:
      - rabbitmq
      - mongo_notification
    networks:
      - microservice_network

  # Web Dashboard
  dashboard:
    image: smart_tracking_dashboard
    build:
      context: ./dashboard
      args:
        - NEXT_PUBLIC_PACKAGE_SERVICE_URL=http://localhost:3001
        - NEXT_PUBLIC_TRACKING_SERVICE_URL=http://localhost:3002
        - NEXT_PUBLIC_NOTIFICATION_SERVICE_URL=http://localhost:3003
    ports:
      - "3000:3000"
    depends_on:
      - package-service
      - tracking-service
      - notification-service
    networks:
      - microservice_network

volumes:
  rabbitmq_data:
  mongo_package_data:
  mongo_tracking_data:
  mongo_notification_data:

networks:
  microservice_network:
    driver: overlay 