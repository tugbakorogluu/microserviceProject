version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: kargo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kargo_network

  package-service:
    build:
      context: ./package-service
      dockerfile: Dockerfile
    container_name: kargo-package-service
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    networks:
      - kargo_network
    environment:
      - NODE_ENV=production

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: kargo-notification-service
    ports:
      - "3003:3003"
    depends_on:
      - mongodb
    networks:
      - kargo_network
    environment:
      - NODE_ENV=production

  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: kargo-tracking-service
    ports:
      - "3002:3002"
    depends_on:
      - mongodb
      - package-service
      - notification-service
    networks:
      - kargo_network
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kargo-frontend
    ports:
      - "8080:80"
    networks:
      - kargo_network

volumes:
  mongodb_data:

networks:
  kargo_network:
    driver: bridge
