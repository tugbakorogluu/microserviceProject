version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: kargo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kargo_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kargo-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - kargo_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  package-service:
    build:
      context: ./package-service
      dockerfile: Dockerfile
    container_name: kargo-package-service
    ports:
      - "3001:3001"
    networks:
      - kargo_network
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://rabbitmq:5672
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: kargo-notification-service
    ports:
      - "3003:3003"
    networks:
      - kargo_network
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://rabbitmq:5672
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003"]
      interval: 30s
      timeout: 10s
      retries: 3

  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: kargo-tracking-service
    ports:
      - "3002:3002"
    networks:
      - kargo_network
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://rabbitmq:5672
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kargo-frontend
    ports:
      - "8080:80"
    networks:
      - kargo_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  kargo_network:
    driver: bridge
